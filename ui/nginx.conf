server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API reverse-proxy — keeps the browser on one origin (no CORS issues)
    location /api/v1/bookings {
        proxy_pass http://booking-service:8081;
        proxy_set_header Host $host;
    }

    location /api/v1/payments {
        proxy_pass http://payment-service:8082;
        proxy_set_header Host $host;
    }

    location /api/v1/notifications {
        proxy_pass http://notification-service:8083;
        proxy_set_header Host $host;
    }
}
