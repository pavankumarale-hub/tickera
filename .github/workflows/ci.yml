name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    # Ubuntu runners ship with Docker, which Testcontainers needs for the
    # Kafka + Postgres integration test.
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build + Checkstyle (no tests)
        run: ./mvnw -B -DskipTests verify

      - name: Consumer contract (generates pact)
        run: ./mvnw -B -pl payment-service test -Dtest=BookingEventsConsumerPactTest

      - name: Provider contract verification
        run: ./mvnw -B -pl booking-service test -Dtest=BookingEventsProviderPactTest

      - name: Unit + integration tests (Testcontainers) + JaCoCo
        run: ./mvnw -B verify

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: '**/target/site/jacoco/'
          if-no-files-found: ignore

  sonar:
    runs-on: ubuntu-latest
    needs: build-and-test
    # Only runs when a SONAR_TOKEN secret is configured, so forks/first clones
    # don't fail. Wire it to SonarCloud in repo settings to light it up.
    if: ${{ github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: SonarCloud scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "${SONAR_TOKEN}" ]; then
            echo "SONAR_TOKEN not set — skipping SonarCloud analysis."
            exit 0
          fi
          ./mvnw -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.host.url=https://sonarcloud.io
