name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Compile + static analysis ──────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Compile + Checkstyle (no tests)
        run: ./mvnw -B -DskipTests verify

  # ── 2. Unit tests ─────────────────────────────────────────────────────────
  unit-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Unit tests (@Tag("unit"))
        run: ./mvnw -B test -Dgroups=unit

      - name: Upload JaCoCo unit-test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-unit
          path: '**/target/site/jacoco/'
          if-no-files-found: ignore

  # ── 3. Consumer-driven contract tests (Pact V3 message) ───────────────────
  # Runs after unit tests to avoid spending time on contracts when basics fail.
  # Consumer (payment-service) generates the pact; provider (booking-service)
  # verifies it in the same job so the generated file is on the same filesystem.
  contract-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Consumer — generate pact (payment-service)
        run: >
          ./mvnw -B -pl payment-service test
          -Dtest=BookingEventsConsumerPactTest
          -Dsurefire.failIfNoSpecifiedTests=false

      - name: Upload generated pact as CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: pacts
          path: pacts/

      - name: Provider — verify pact (booking-service)
        run: >
          ./mvnw -B -pl booking-service test
          -Dtest=BookingEventsProviderPactTest
          -Dsurefire.failIfNoSpecifiedTests=false

  # ── 4. Integration tests (Testcontainers — needs Docker on runner) ─────────
  # Runs in parallel with contract-tests; both depend only on unit-tests.
  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Integration tests (@Tag("integration") — real Postgres + Kafka)
        run: ./mvnw -B test -Dgroups=integration

      - name: Upload JaCoCo integration-test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-integration
          path: '**/target/site/jacoco/'
          if-no-files-found: ignore

  # ── 5. SonarCloud — only on push, only when token is configured ───────────
  sonar:
    runs-on: ubuntu-latest
    needs: [contract-tests, integration-tests]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: SonarCloud scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "${SONAR_TOKEN}" ]; then
            echo "SONAR_TOKEN not set — skipping SonarCloud analysis."
            exit 0
          fi
          ./mvnw -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.host.url=https://sonarcloud.io
