# One-command local stack:  docker compose up --build
#
# Brings up Kafka + Zookeeper, Redis, a Postgres per service (database-per-service),
# the three microservices, and a Prometheus + Grafana observability stack.
name: tickera

services:
  # ----------------------------------------------------------------- messaging
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.1
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:29092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10

  # -------------------------------------------------------------------- caches
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ------------------------------------------------ databases (one per service)
  postgres-booking:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: booking_db
      POSTGRES_USER: tickera
      POSTGRES_PASSWORD: tickera
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tickera -d booking_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-payment:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: tickera
      POSTGRES_PASSWORD: tickera
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tickera -d payment_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-notification:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: tickera
      POSTGRES_PASSWORD: tickera
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tickera -d notification_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ------------------------------------------------------------------ services
  booking-service:
    build:
      context: .
      dockerfile: booking-service/Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres-booking:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      DB_URL: jdbc:postgresql://postgres-booking:5432/booking_db
      DB_USER: tickera
      DB_PASSWORD: tickera
      KAFKA_BOOTSTRAP: kafka:29092
      REDIS_HOST: redis
      REDIS_PORT: 6379

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres-payment:
        condition: service_healthy
    ports:
      - "8082:8082"
    environment:
      DB_URL: jdbc:postgresql://postgres-payment:5432/payment_db
      DB_USER: tickera
      DB_PASSWORD: tickera
      KAFKA_BOOTSTRAP: kafka:29092
      REDIS_HOST: redis
      REDIS_PORT: 6379

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
      postgres-notification:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      DB_URL: jdbc:postgresql://postgres-notification:5432/notification_db
      DB_USER: tickera
      DB_PASSWORD: tickera
      KAFKA_BOOTSTRAP: kafka:29092

  # -------------------------------------------------------------- observability
  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:10.4.2
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
